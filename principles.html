<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지훈의 SSAFY 생존 원칙 - 학습 원칙</title>
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <!-- Tailwind CSS Browser Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* active 메뉴 하단 밑줄 및 활성 상태 스타일 */
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 15px;
            right: 15px;
            height: 3px;
            background-color: #0A6EBD;
            border-radius: 3px 3px 0 0;
        }

        @media screen and (max-width: 768px) {
            .nav-item.active::after {
                bottom: 12px;
                left: 50%;
                right: auto;
                width: 80px;
                transform: translateX(-50%);
            }
        }

        /* 햄버거 아이콘 open 상태 애니메이션 */
        .navbar-toggle .bar {
            transition: all 0.3s ease-in-out;
        }
        .navbar-toggle.open .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .navbar-toggle.open .bar:nth-child(2) {
            opacity: 0;
        }
        .navbar-toggle.open .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* 모바일 메뉴 show 상태 및 슬라이드 트랜지션 */
        @media screen and (max-width: 768px) {
            .navbar-menu {
                transition: max-height 0.4s ease-in-out;
            }
            .navbar-menu.show {
                max-height: 350px;
            }
        }
    </style>
</head>
<body class="bg-white pt-[60px] text-[#111111] overflow-x-hidden">

    <!-- ==== 복사 시작: 네비게이션 바 HTML (active 클래스는 "학습 원칙"에 고정 적용) ==== -->
    <nav class="navbar fixed top-0 left-0 w-full h-[60px] bg-white border-b border-[#E5E8EB] z-[1000]">
        <div class="navbar-container max-w-[1024px] mx-auto px-[20px] flex justify-between items-center h-full">
            <!-- 1. 로고 -->
            <a href="index.html" class="navbar-logo text-[1.25rem] font-extrabold text-[#111111] tracking-[-0.02em]">JIHUN SSAFY</a>
            
            <!-- 2. 모바일용 햄버거 버튼 -->
            <button class="navbar-toggle hidden max-[768px]:block bg-transparent border-none cursor-pointer p-[5px] z-[1001]" aria-label="메뉴 열기">
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
            </button>
            
            <!-- 3. 페이지 메뉴 목록 (학습 원칙에만 active 클래스 적용) -->
            <ul class="navbar-menu flex items-center gap-[10px] max-[768px]:absolute max-[768px]:top-[60px] max-[768px]:left-0 max-[768px]:w-full max-[768px]:bg-white max-[768px]:flex-col max-[768px]:gap-0 max-[768px]:max-h-0 max-[768px]:overflow-hidden max-[768px]:shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1)]">
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="index.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">홈</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="strategy.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">환경 전략</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="principles.html" class="nav-item active block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#0A6EBD] max-[768px]:bg-[#EBF5FB] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">학습 원칙</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="routine.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">생활 루틴</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:last:border-b-0"><a href="reminder.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">다짐 리마인드</a></li>
            </ul>
        </div>
    </nav>
    <!-- ==== 복사 끝: 네비게이션 바 HTML ==== -->

    <!-- ==== 학습 원칙 본문 영역 ==== -->
    <main class="w-full min-h-[calc(100vh-60px)] bg-[#EBF5FB] flex items-center justify-center py-[80px] px-[20px] max-[900px]:py-[60px] max-[900px]:px-[16px]">
        <div class="max-w-[1024px] w-full mx-auto text-center">
            <!-- 영문 소제목 -->
            <span class="text-[1.1rem] font-bold text-[#0A6EBD] uppercase tracking-[0.12em] mb-[12px] block">Uncompromising Rules</span>
            <!-- 한글 메인 대제목 -->
            <h1 class="text-[2.5rem] font-extrabold text-[#111111] mb-[50px] max-[900px]:text-[2rem] max-[900px]:mb-[35px] tracking-[-0.03em]">타협 없는 3대 학습 원칙</h1>

            <!-- 가로 3열 카드형 구조 -->
            <div class="grid grid-cols-3 max-[900px]:grid-cols-1 gap-[24px] max-[900px]:gap-[20px] max-w-full max-[900px]:max-w-[480px] mx-auto">
                
                <!-- 카드 1: 당일 과제 완료 -->
                <div class="principles-card group bg-white border border-[#E5E8EB] rounded-[20px] py-[45px] px-[30px] max-[900px]:py-[35px] max-[900px]:px-[24px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.08)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:scale-105 hover:border-[#0A6EBD] transition-all duration-300 ease-in-out flex flex-col items-center justify-start">
                    <div class="card-icon w-[64px] h-[64px] max-[900px]:w-[56px] max-[900px]:h-[56px] flex items-center justify-center mb-[24px] max-[900px]:mb-[18px] text-[#0A6EBD] transition-transform duration-300 ease-in-out group-hover:-translate-y-[4px]">
                        <!-- 성공적인 완료를 형상화한 체크리스트/클립보드 SVG 아이콘 -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[900px]:text-[1.25rem] font-extrabold text-[#111111] mb-[16px] max-[900px]:mb-[12px] tracking-[-0.01em]">당일 과제 완료</h2>
                    <p class="card-desc text-[1rem] max-[900px]:text-[0.95rem] font-medium text-[#555555] leading-[1.6] break-keep">그날 부여받은 과제는 반드시 그날 완수합니다.</p>
                </div>

                <!-- 카드 2: 저녁 복습 -->
                <div class="principles-card group bg-white border border-[#E5E8EB] rounded-[20px] py-[45px] px-[30px] max-[900px]:py-[35px] max-[900px]:px-[24px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.08)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:scale-105 hover:border-[#0A6EBD] transition-all duration-300 ease-in-out flex flex-col items-center justify-start">
                    <div class="card-icon w-[64px] h-[64px] max-[900px]:w-[56px] max-[900px]:h-[56px] flex items-center justify-center mb-[24px] max-[900px]:mb-[18px] text-[#0A6EBD] transition-transform duration-300 ease-in-out group-hover:-translate-y-[4px]">
                        <!-- 차분하고 집중적인 저녁 시간 복습을 고양하는 초승달 모양 SVG 아이콘 -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[900px]:text-[1.25rem] font-extrabold text-[#111111] mb-[16px] max-[900px]:mb-[12px] tracking-[-0.01em]">저녁 복습</h2>
                    <p class="card-desc text-[1rem] max-[900px]:text-[0.95rem] font-medium text-[#555555] leading-[1.6] break-keep">당일 배운 내용을 내 것으로 만들기 위해 반드시 복습합니다.</p>
                </div>

                <!-- 카드 3: 완벽한 이해 -->
                <div class="principles-card group bg-white border border-[#E5E8EB] rounded-[20px] py-[45px] px-[30px] max-[900px]:py-[35px] max-[900px]:px-[24px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.08)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:scale-105 hover:border-[#0A6EBD] transition-all duration-300 ease-in-out flex flex-col items-center justify-start">
                    <div class="card-icon w-[64px] h-[64px] max-[900px]:w-[56px] max-[900px]:h-[56px] flex items-center justify-center mb-[24px] max-[900px]:mb-[18px] text-[#0A6EBD] transition-transform duration-300 ease-in-out group-hover:-translate-y-[4px]">
                        <!-- 지적 호기심과 논리적 해결 및 이해를 나타내는 전구 SVG 아이콘 -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[900px]:text-[1.25rem] font-extrabold text-[#111111] mb-[16px] max-[900px]:mb-[12px] tracking-[-0.01em]">완벽한 이해</h2>
                    <p class="card-desc text-[1rem] max-[900px]:text-[0.95rem] font-medium text-[#555555] leading-[1.6] break-keep">질문을 두려워하지 않고 확실히 이해하고 넘어갑니다.</p>
                </div>

            </div>
        </div>
    </main>

    <!-- ==== 복사 시작: 모바일 네비게이션 스크립트 ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('.navbar-toggle');
            const menu = document.querySelector('.navbar-menu');

            // 햄버거 버튼 클릭 이벤트 리스너
            toggleButton.addEventListener('click', () => {
                // 메뉴 보이기/숨기기 토글
                menu.classList.toggle('show');
                // 햄버거 아이콘 X 모양 변환 토글
                toggleButton.classList.toggle('open');
            });

            // 화면 너비가 넓어지면(PC버전) 모바일 메뉴 초기화
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    menu.classList.remove('show');
                    toggleButton.classList.remove('open');
                }
            });
        });
    </script>
    <!-- ==== 복사 끝: 모바일 네비게이션 스크립트 ==== -->

</body>
</html>
