<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지훈의 SSAFY 생존 원칙 - 홈</title>
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <!-- Tailwind CSS Browser CDN (v4) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* active 메뉴 하단 밑줄 및 활성 상태 스타일 */
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 15px;
            right: 15px;
            height: 3px;
            background-color: #0A6EBD;
            border-radius: 3px 3px 0 0;
        }

        @media screen and (max-width: 768px) {
            .nav-item.active::after {
                bottom: 12px;
                left: 50%;
                right: auto;
                width: 80px;
                transform: translateX(-50%);
            }
        }

        /* 햄버거 아이콘 open 상태 애니메이션 */
        .navbar-toggle .bar {
            transition: all 0.3s ease-in-out;
        }
        .navbar-toggle.open .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .navbar-toggle.open .bar:nth-child(2) {
            opacity: 0;
        }
        .navbar-toggle.open .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* 모바일 메뉴 show 상태 및 슬라이드 트랜지션 */
        @media screen and (max-width: 768px) {
            .navbar-menu {
                transition: max-height 0.4s ease-in-out;
            }
            .navbar-menu.show {
                max-height: 350px;
            }
        }

        /* 히어로 섹션 전용 파란색 톤 업 그래디언트 */
        .hero-section {
            background: radial-gradient(circle at 50% 50%, #1583DB 0%, #0A6EBD 100%);
        }

        /* 기하학 디자인 도트 패턴 */
        .hero-background-pattern {
            background-image: radial-gradient(circle, #FFFFFF 1.5px, transparent 1.5px);
            background-size: 32px 32px;
        }

        /* 텍스트 섀도우 효과 */
        .hero-title {
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .game-overlay-text {
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            animation: pulse 1.5s infinite;
        }

        .hero-container {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* 안내 문구 고동치는 효과 */
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.8; }
        }

        /* 페이드업 애니메이션 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-white pt-[60px] text-[#111111] overflow-x-hidden">

    <!-- ==== 복사 시작: 네비게이션 바 HTML ==== -->
    <nav class="navbar fixed top-0 left-0 w-full h-[60px] bg-white border-b border-[#E5E8EB] z-[1000]">
        <div class="navbar-container max-w-[1024px] mx-auto px-[20px] flex justify-between items-center h-full">
            <!-- 1. 로고 -->
            <a href="index.html" class="navbar-logo text-[1.25rem] font-extrabold text-[#111111] tracking-[-0.02em]">JIHUN SSAFY</a>
            
            <!-- 2. 모바일용 햄버거 버튼 -->
            <button class="navbar-toggle hidden max-[768px]:block bg-transparent border-none cursor-pointer p-[5px] z-[1001]" aria-label="메뉴 열기">
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
            </button>
            
            <!-- 3. 페이지 메뉴 목록 (홈 메뉴에만 active 클래스 지정) -->
            <ul class="navbar-menu flex items-center gap-[10px] max-[768px]:absolute max-[768px]:top-[60px] max-[768px]:left-0 max-[768px]:w-full max-[768px]:bg-white max-[768px]:flex-col max-[768px]:gap-0 max-[768px]:max-h-0 max-[768px]:overflow-hidden max-[768px]:shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1)]">
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="index.html" class="nav-item active block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#0A6EBD] max-[768px]:bg-[#EBF5FB] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">홈</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="strategy.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">환경 전략</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="principles.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">학습 원칙</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="routine.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">생활 루틴</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:last:border-b-0"><a href="reminder.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">다짐 리마인드</a></li>
            </ul>
        </div>
    </nav>
    <!-- ==== 복사 끝: 네비게이션 바 HTML ==== -->

    <!-- ==== 메인 홈 비주얼 영역 (히어로 섹션) ==== -->
    <main class="hero-section min-h-[calc(100vh-60px)] w-full text-white flex items-center justify-center relative overflow-hidden p-[40px_20px]">
        <!-- 배경 디테일 레이어 -->
        <div class="hero-background-pattern absolute top-0 left-0 w-full h-full opacity-[0.08] pointer-events-none"></div>
        
        <div class="hero-container max-w-[800px] w-full text-center z-2 flex flex-col items-center justify-center">
            <!-- 큰 제목 -->
            <h1 class="hero-title text-[clamp(3.5rem,10vw,6.5rem)] font-[900] tracking-[-0.03em] mb-[12px] leading-[1.1] select-none">SSAFY</h1>
            <!-- 설명 문구 -->
            <p class="hero-description text-[clamp(1rem,2.5vw,1.4rem)] font-[500] leading-[1.6] mb-[30px] text-white/95 tracking-[-0.01em] break-keep">타협 없는 몰입, 지훈의 SSAFY 1년 성장 각오</p>
            
            <!-- [수정] 백그라운드 카드 없는 미니멀 구조의 공룡 게임 영역 -->
            <div class="game-minimal-container w-full max-w-[480px] flex flex-col items-center mt-[20px]">
                <div class="game-screen relative w-full h-[150px] bg-transparent overflow-hidden flex items-end" id="game-screen">
                    <!-- 바닥 방어선 (수평선 단일 라인) -->
                    <div class="game-floor absolute bottom-0 left-0 w-full h-[2px] bg-white z-[4]"></div>

                    <!-- 캐릭터 (SSAFY 교육생 상징 이모지) -->
                    <div id="game-character" class="absolute left-[50px] bottom-[2px] w-[36px] h-[36px] text-[32px] leading-[36px] text-center z-[5] transition-transform duration-[0.05s] ease-linear">🧑‍💻</div>

                    <!-- 실시간으로 오른쪽에서 돌진해오는 장애물 -->
                    <div id="game-obstacle" class="absolute left-full bottom-[2px] w-[34px] h-[34px] text-[30px] leading-[34px] text-center z-[5]">📝</div>

                    <!-- [수정] 상시 노출 상태 안내 오버레이 -->
                    <div class="game-overlay absolute top-0 left-0 w-full h-full flex justify-center items-center z-[7] text-center" id="game-overlay">
                        <div class="game-overlay-text text-[1.05rem] font-[800] text-white break-keep leading-[1.4]" id="game-overlay-text">게임 시작 버튼을 눌러 도전하세요</div>
                    </div>
                </div>

                <!-- [수정] 단일 기능 컨트롤러 버튼 -->
                <button class="game-action-btn bg-white text-[#111111] py-[15px] px-[45px] text-[1.05rem] font-[800] border-none rounded-[30px] cursor-pointer shadow-[0_4px_15px_rgba(0,0,0,0.2)] transition-all duration-250 ease-out outline-none inline-flex items-center justify-center gap-[8px] mt-[25px] touch-manipulation hover:translate-y-[-2px] hover:shadow-[0_8px_22px_rgba(0,0,0,0.3)] hover:bg-[#EBF5FB] hover:text-[#0A6EBD] active:translate-y-0 active:shadow-[0_4px_12px_rgba(0,0,0,0.2)]" id="btn-action">
                    게임 시작
                </button>
            </div>
        </div>
    </main>

    <!-- ==== 복사 시작: 모바일 네비게이션 스크립트 ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('.navbar-toggle');
            const menu = document.querySelector('.navbar-menu');

            // 햄버거 버튼 클릭 이벤트 리스너
            toggleButton.addEventListener('click', () => {
                // 메뉴 보이기/숨기기 토글
                menu.classList.toggle('show');
                // 햄버거 아이콘 X 모양 변환 토글
                toggleButton.classList.toggle('open');
            });

            // 화면 너비가 넓어지면(PC버전) 모바일 메뉴 초기화
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    menu.classList.remove('show');
                    toggleButton.classList.remove('open');
                }
            });
        });
    </script>
    <!-- ==== 복사 끝: 모바일 네비게이션 스크립트 ==== -->

    <!-- ==== 미니게임 구동용 순수 바닐라 JavaScript ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 게임 엔진용 DOM 요소 탐색
            const gameScreen = document.getElementById('game-screen');
            const character = document.getElementById('game-character');
            const obstacle = document.getElementById('game-obstacle');
            const overlay = document.getElementById('game-overlay');
            const overlayText = document.getElementById('game-overlay-text');
            const btnAction = document.getElementById('btn-action');

            // 게임 플레이 핵심 상태 관리 변수
            let isPlaying = false;
            let gameLoopRequest = null;

            // 중력 및 점프 물리 연산 파라미터 (60fps 기반의 Euler 연산 구현)
            const gravity = 0.55;           // 하강 견인 물리 속도
            const jumpStrength = 11.5;      // 캐릭터 최초 점프 탄성 (미니멀 화면 규격 상향 조정)
            let charY = 0;                  // 바닥선(2px) 위 캐릭터의 Y축 높이 (px)
            let charVelocityY = 0;          // 캐릭터 수직 속도
            let isJumping = false;          // 점프 중복 발생 제어 플래그

            // 장애물 연산 전용 상태 변수
            let obstacleX = 0;              // 장애물의 수평 X축 좌표 (px)
            const obstacleSpeed = 5.2;      // 크롬 공룡 게임 느낌의 고정적 쾌속 스크롤링
            let currentObstacleEmoji = '📝'; // 현재 화면에 등장한 위협 요소 이모지

            // [수정] 위협 요소 이모지 풀 (과제 📝, 오류 🐛, 시험 ❌, 버그 ⚠️, 경고 🔥)
            const obstaclePool = ['📝', '🐛', '❌', '⚠️', '🔥'];

            // 1. 캐릭터 점프 액션 연산 함수
            function triggerJump() {
                if (!isPlaying || isJumping) return;
                isJumping = true;
                charVelocityY = jumpStrength;
            }

            // 2. 물리 갱신 및 프레임별 충돌 연산 엔진 (Main Game Loop)
            function updateFrame() {
                if (!isPlaying) return;

                // [A] 캐릭터 물리 법칙 계산
                if (isJumping) {
                    charVelocityY -= gravity; // 중력 누적 반영
                    charY += charVelocityY;   // Y 위치 이동

                    // 바닥선(bottom: 2px) 위에 착지했는지 검사
                    if (charY <= 0) {
                        charY = 0;
                        charVelocityY = 0;
                        isJumping = false;
                    }
                }
                // 캐릭터 Y축 포지션 DOM 갱신 (바닥선 2px 위 기준)
                character.style.bottom = (2 + charY) + 'px';

                // [B] 장애물 스크롤링 물리 계산
                obstacleX -= obstacleSpeed;
                if (obstacleX < -40) {
                    // 화면 왼쪽 한계를 넘어가 탈출했을 경우 -> 리스폰 및 무작위 패턴 갱신
                    obstacleX = gameScreen.clientWidth;
                    const randomIndex = Math.floor(Math.random() * obstaclePool.length);
                    currentObstacleEmoji = obstaclePool[randomIndex];
                    obstacle.textContent = currentObstacleEmoji;
                }
                // 장애물 X축 포지션 DOM 갱신
                obstacle.style.left = obstacleX + 'px';

                // [C] 크롬 공룡 스타일 전용 정밀 충돌 판정 시스템
                const charLeft = 50 + 6;           // X좌표 오프셋 보정 마진
                const charRight = 50 + 36 - 6;
                const charHeight = 36;

                const obsLeft = obstacleX + 5;
                const obsRight = obstacleX + 34 - 5;
                const obsHeight = 30;              // 위협 높이 가중치 판정

                // X축과 Y축 충돌 교차 조건 연산
                const hasOverlapX = (charRight > obsLeft) && (charLeft < obsRight);
                const hasOverlapY = (charY < obsHeight);

                if (hasOverlapX && hasOverlapY) {
                    // 충돌 감지 -> 게임 강제 중단
                    handleGameOver();
                    return;
                }

                // 다음 루프 드로우 스케줄링
                gameLoopRequest = requestAnimationFrame(updateFrame);
            }

            // 3. 게임 시작 함수 (State & Single Button Controls)
            function startGame() {
                if (isPlaying) return; // 중복 플레이 가드레일 작동

                // 상태 초기화
                isPlaying = true;
                charY = 0;
                charVelocityY = 0;
                isJumping = false;
                
                // 장애물 시작 포지션을 우측 너비 한계 밖으로 리셋
                obstacleX = gameScreen.clientWidth;
                obstacle.textContent = obstaclePool[Math.floor(Math.random() * obstaclePool.length)];

                // [수정] 안내 오버레이 숨기기 및 물리 캐릭터 원위치 리셋
                overlay.style.display = 'none';
                character.style.bottom = '2px';
                obstacle.style.left = obstacleX + 'px';

                // [수정] 단일 액션 버튼을 즉시 "점프" 문구로 변경
                btnAction.textContent = '점프';

                // 60fps 바닐라 드로우 프레임 가동
                updateFrame();
            }

            // 4. 게임 오버 처리 함수
            function handleGameOver() {
                isPlaying = false;

                // [수정] 애니메이션 프레임 중단으로 장애물 그 자리에 멈추기
                if (gameLoopRequest) cancelAnimationFrame(gameLoopRequest);

                // [수정] 실패 메시지 레이어 띄우기 및 버튼 문구 복원
                overlayText.textContent = '실패해도 다시 도전!';
                overlay.style.display = 'flex';
                btnAction.textContent = '게임 시작';
            }

            // ==== 조작 바인딩 레이어 ====

            // [수정] 단일 버튼 하나로 시작 & 점프를 동시 바인딩 처리
            btnAction.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isPlaying) {
                    startGame();
                } else {
                    triggerJump();
                }
            });

            // [수정] PC 키보드 유저를 위한 단축키 대응 (Space, ArrowUp)
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    if (isPlaying) {
                        e.preventDefault(); // 브라우저 창 스크롤 방지
                        triggerJump();
                    }
                }
            });
        });
    </script>
</body>
</html>
