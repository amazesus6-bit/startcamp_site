<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지훈의 SSAFY 생존 원칙 - 환경 맞춤 실전 전략</title>
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <!-- Tailwind CSS Browser CDN (v4) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* active 메뉴 하단 밑줄 및 활성 상태 스타일 */
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 15px;
            right: 15px;
            height: 3px;
            background-color: #0A6EBD;
            border-radius: 3px 3px 0 0;
        }

        @media screen and (max-width: 768px) {
            .nav-item.active::after {
                bottom: 12px;
                left: 50%;
                right: auto;
                width: 80px;
                transform: translateX(-50%);
            }
        }

        /* 햄버거 아이콘 open 상태 애니메이션 */
        .navbar-toggle .bar {
            transition: all 0.3s ease-in-out;
        }
        .navbar-toggle.open .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .navbar-toggle.open .bar:nth-child(2) {
            opacity: 0;
        }
        .navbar-toggle.open .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* 모바일 메뉴 show 상태 및 슬라이드 트랜지션 */
        @media screen and (max-width: 768px) {
            .navbar-menu {
                transition: max-height 0.4s ease-in-out;
            }
            .navbar-menu.show {
                max-height: 350px;
            }
        }

        /* 카드 마우스 호버 트랜지션 */
        .strategy-card {
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .strategy-card .card-icon {
            transition: transform 0.3s ease;
        }
        .strategy-card:hover .card-icon {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-white pt-[60px] text-[#111111] overflow-x-hidden">

    <!-- ==== 복사 시작: 네비게이션 바 HTML ==== -->
    <nav class="navbar fixed top-0 left-0 w-full h-[60px] bg-white border-b border-[#E5E8EB] z-[1000]">
        <div class="navbar-container max-w-[1024px] mx-auto px-[20px] flex justify-between items-center h-full">
            <!-- 1. 로고 -->
            <a href="index.html" class="navbar-logo text-[1.25rem] font-extrabold text-[#111111] tracking-[-0.02em]">JIHUN SSAFY</a>
            
            <!-- 2. 모바일용 햄버거 버튼 -->
            <button class="navbar-toggle hidden max-[768px]:block bg-transparent border-none cursor-pointer p-[5px] z-[1001]" aria-label="메뉴 열기">
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
            </button>
            
            <!-- 3. 페이지 메뉴 목록 (환경 전략 메뉴에만 'active' 클래스 적용) -->
            <ul class="navbar-menu flex items-center gap-[10px] max-[768px]:absolute max-[768px]:top-[60px] max-[768px]:left-0 max-[768px]:w-full max-[768px]:bg-white max-[768px]:flex-col max-[768px]:gap-0 max-[768px]:max-h-0 max-[768px]:overflow-hidden max-[768px]:shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1)]">
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="index.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">홈</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="strategy.html" class="nav-item active block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#0A6EBD] max-[768px]:bg-[#EBF5FB] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">환경 전략</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="principles.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">학습 원칙</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="routine.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">생활 루틴</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:last:border-b-0"><a href="reminder.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">다짐 리마인드</a></li>
            </ul>
        </div>
    </nav>
    <!-- ==== 복사 끝: 네비게이션 바 HTML ==== -->

    <!-- ==== 환경 맞춤 실전 전략 본문 영역 ==== -->
    <main class="strategy-section w-full min-h-[calc(100vh-60px)] bg-[#EBF5FB] flex items-center justify-center py-[80px] px-[20px] max-[768px]:py-[50px] max-[768px]:px-[16px]">
        <div class="strategy-container max-w-[1024px] w-full mx-auto text-center">
            <!-- 영문 소제목 -->
            <span class="strategy-subtitle text-[1.1rem] font-bold text-[#0A6EBD] uppercase tracking-[0.1em] mb-[12px] block">Real-world Strategy</span>
            <!-- 한글 메인 대제목 -->
            <h1 class="strategy-title text-[2.5rem] max-[768px]:text-[2rem] font-extrabold text-[#111111] mb-[50px] max-[768px]:mb-[35px] tracking-[-0.03em]">환경 맞춤 실전 전략</h1>

            <!-- 2x2 카드 레이아웃 -->
            <div class="strategy-grid grid grid-cols-2 max-[768px]:grid-cols-1 gap-[24px] max-[768px]:gap-[16px] max-w-[860px] mx-auto">
                <!-- 카드 1: 기기 지참 불가 -->
                <div class="strategy-card bg-white border border-[#E5E8EB] rounded-[20px] p-[40px_30px] max-[768px]:p-[30px_20px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.06)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:-translate-y-[8px] hover:border-[#0A6EBD] flex flex-col items-center justify-center">
                    <div class="card-icon w-[64px] h-[64px] max-[768px]:w-[56px] max-[768px]:h-[56px] flex items-center justify-center mb-[24px] max-[768px]:mb-[18px] text-[#0A6EBD]">
                        <!-- 기기 반입 및 사용 제한을 직관적으로 표현하는 금지 라인 스크린 SVG -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[768px]:text-[1.2rem] font-extrabold text-[#111111] mb-[14px] max-[768px]:mb-[10px] tracking-[-0.01em]">기기 지참 불가</h2>
                    <p class="card-desc text-[1rem] max-[768px]:text-[0.95rem] font-medium text-[#666666] leading-[1.6] break-keep">오프라인 환경을 정확히 인지합니다.</p>
                </div>

                <!-- 카드 2: Notion 핵심 요약 -->
                <div class="strategy-card bg-white border border-[#E5E8EB] rounded-[20px] p-[40px_30px] max-[768px]:p-[30px_20px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.06)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:-translate-y-[8px] hover:border-[#0A6EBD] flex flex-col items-center justify-center">
                    <div class="card-icon w-[64px] h-[64px] max-[768px]:w-[56px] max-[768px]:h-[56px] flex items-center justify-center mb-[24px] max-[768px]:mb-[18px] text-[#0A6EBD]">
                        <!-- 노트 정리 및 구조화된 문서를 상징하는 Document SVG -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[768px]:text-[1.2rem] font-extrabold text-[#111111] mb-[14px] max-[768px]:mb-[10px] tracking-[-0.01em]">Notion 핵심 요약</h2>
                    <p class="card-desc text-[1rem] max-[768px]:text-[0.95rem] font-medium text-[#666666] leading-[1.6] break-keep">체계적으로 텍스트 기반 핵심을 요약합니다.</p>
                </div>

                <!-- 카드 3: 적극적인 활동 참여 -->
                <div class="strategy-card bg-white border border-[#E5E8EB] rounded-[20px] p-[40px_30px] max-[768px]:p-[30px_20px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.06)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:-translate-y-[8px] hover:border-[#0A6EBD] flex flex-col items-center justify-center">
                    <div class="card-icon w-[64px] h-[64px] max-[768px]:w-[56px] max-[768px]:h-[56px] flex items-center justify-center mb-[24px] max-[768px]:mb-[18px] text-[#0A6EBD]">
                        <!-- 적극적인 번개 기동 및 하이엔드 액션을 강조하는 번개(Bolt) 에너지 SVG -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[768px]:text-[1.2rem] font-extrabold text-[#111111] mb-[14px] max-[768px]:mb-[10px] tracking-[-0.01em]">적극적인 활동 참여</h2>
                    <p class="card-desc text-[1rem] max-[768px]:text-[0.95rem] font-medium text-[#666666] leading-[1.6] break-keep">먼저 다가가는 능동적인 참여를 실천합니다.</p>
                </div>

                <!-- 카드 4: 공식 플랫폼 활용 -->
                <div class="strategy-card bg-white border border-[#E5E8EB] rounded-[20px] p-[40px_30px] max-[768px]:p-[30px_20px] text-center shadow-[0_10px_30px_rgba(10,110,189,0.06)] hover:shadow-[0_20px_40px_rgba(10,110,189,0.12)] hover:-translate-y-[8px] hover:border-[#0A6EBD] flex flex-col items-center justify-center">
                    <div class="card-icon w-[64px] h-[64px] max-[768px]:w-[56px] max-[768px]:h-[56px] flex items-center justify-center mb-[24px] max-[768px]:mb-[18px] text-[#0A6EBD]">
                        <!-- 공식 시스템 브라우저 / 탭 구동을 직관적으로 보여주는 플랫폼 SVG -->
                        <svg width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"></path>
                        </svg>
                    </div>
                    <h2 class="card-title text-[1.35rem] max-[768px]:text-[1.2rem] font-extrabold text-[#111111] mb-[14px] max-[768px]:mb-[10px] tracking-[-0.01em]">공식 플랫폼 활용</h2>
                    <p class="card-desc text-[1rem] max-[768px]:text-[0.95rem] font-medium text-[#666666] leading-[1.6] break-keep">SSAFY 공식 도구와 플랫폼을 적극적으로 활용합니다.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ==== 복사 시작: 모바일 네비게이션 스크립트 ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('.navbar-toggle');
            const menu = document.querySelector('.navbar-menu');

            // 햄버거 버튼 클릭 이벤트 리스너
            toggleButton.addEventListener('click', () => {
                // 메뉴 보이기/숨기기 토글
                menu.classList.toggle('show');
                // 햄버거 아이콘 X 모양 변환 토글
                toggleButton.classList.toggle('open');
            });

            // 화면 너비가 넓어지면(PC버전) 모바일 메뉴 초기화
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    menu.classList.remove('show');
                    toggleButton.classList.remove('open');
                }
            });
        });
    </script>
    <!-- ==== 복사 끝: 모바일 네비게이션 스크립트 ==== -->

</body>
</html>
