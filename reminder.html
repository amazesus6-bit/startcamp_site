<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지훈의 SSAFY 생존 원칙 - 다짐 리마인드</title>
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <!-- Tailwind CSS Browser Play CDN (v4) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* active 메뉴 하단 밑줄 및 활성 상태 스타일 */
        .nav-item.active::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 15px;
            right: 15px;
            height: 3px;
            background-color: #0A6EBD;
            border-radius: 3px 3px 0 0;
        }

        @media screen and (max-width: 768px) {
            .nav-item.active::after {
                bottom: 12px;
                left: 50%;
                right: auto;
                width: 80px;
                transform: translateX(-50%);
            }
        }

        /* 햄버거 아이콘 open 상태 애니메이션 */
        .navbar-toggle .bar {
            transition: all 0.3s ease-in-out;
        }
        .navbar-toggle.open .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .navbar-toggle.open .bar:nth-child(2) {
            opacity: 0;
        }
        .navbar-toggle.open .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* 모바일 메뉴 show 상태 및 슬라이드 트랜지션 */
        @media screen and (max-width: 768px) {
            .navbar-menu {
                transition: max-height 0.4s ease-in-out;
            }
            .navbar-menu.show {
                max-height: 350px;
            }
        }

        /* 다짐 리마인드 팝업 모달 오버레이 및 모달 카드의 상태 전환 */
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-overlay.show .modal-card {
            transform: scale(1) translateY(0);
        }

        /* 카드 최초 진입 페이드인 업 트랜지션 정의 */
        .animated-entrance {
            animation: cardEntrance 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-white pt-[60px] text-[#111111] overflow-x-hidden">

    <!-- ==== 복사 시작: 네비게이션 바 HTML (active 클래스는 "다짐 리마인드"에만 독점 지정) ==== -->
    <nav class="navbar fixed top-0 left-0 w-full h-[60px] bg-white border-b border-[#E5E8EB] z-[1000]">
        <div class="navbar-container max-w-[1024px] mx-auto px-[20px] flex justify-between items-center h-full">
            <!-- 1. 로고 -->
            <a href="index.html" class="navbar-logo text-[1.25rem] font-extrabold text-[#111111] tracking-[-0.02em]">JIHUN SSAFY</a>
            
            <!-- 2. 모바일용 햄버거 버튼 -->
            <button class="navbar-toggle hidden max-[768px]:block bg-transparent border-none cursor-pointer p-[5px] z-[1001]" aria-label="메뉴 열기">
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
                <span class="bar block w-[24px] h-[3px] my-[5px] mx-0 bg-[#111111] rounded-[3px]"></span>
            </button>
            
            <!-- 3. 페이지 메뉴 목록 (다짐 리마인드에만 active 클래스 적용) -->
            <ul class="navbar-menu flex items-center gap-[10px] max-[768px]:absolute max-[768px]:top-[60px] max-[768px]:left-0 max-[768px]:w-full max-[768px]:bg-white max-[768px]:flex-col max-[768px]:gap-0 max-[768px]:max-h-0 max-[768px]:overflow-hidden max-[768px]:shadow-[0_10px_15px_-3px_rgba(0,0,0,0.1)]">
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="index.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">홈</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="strategy.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">환경 전략</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="principles.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">학습 원칙</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:border-b max-[768px]:border-[#E5E8EB]"><a href="routine.html" class="nav-item block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#111111] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">생활 루틴</a></li>
                <li class="max-[768px]:w-full max-[768px]:text-center max-[768px]:last:border-b-0"><a href="reminder.html" class="nav-item active block px-[15px] leading-[60px] text-[1rem] font-semibold text-[#0A6EBD] max-[768px]:bg-[#EBF5FB] relative transition-colors duration-300 hover:text-[#0A6EBD] max-[768px]:line-height-normal max-[768px]:py-[20px] max-[768px]:px-0">다짐 리마인드</a></li>
            </ul>
        </div>
    </nav>
    <!-- ==== 복사 끝: 네비게이션 바 HTML ==== -->

    <!-- ==== 다짐 리마인드 전용 본문 영역 ==== -->
    <main class="w-full min-h-[calc(100vh-60px)] bg-[#EBF5FB] flex items-center justify-center py-[40px] px-[20px]">
        <div class="animated-entrance max-w-[680px] w-full bg-white border border-[#E5E8EB] rounded-[24px] p-[70px_45px] max-[550px]:p-[45px_24px] text-center shadow-[0_15px_45px_rgba(10,110,189,0.08)]">
            <!-- 고딕적이고 정갈하게 다듬어진 1일차 텍스트 구조 -->
            <h1 class="text-[1.75rem] min-[550px]:text-[2.4rem] font-extrabold text-[#111111] leading-[1.45] mb-[24px] tracking-[-0.03em] break-keep">초심을 잃고 흔들릴 때마다,<br>이 공간을 기억할 것</h1>
            <p class="text-[1rem] min-[550px]:text-[1.2rem] font-semibold text-[#555555] leading-[1.6] mb-[50px] max-[550px]:mb-[35px] break-keep">1년 뒤, 타협하지 않은 나 자신에게 당당해질 수 있도록.</p>
            
            <!-- 다짐 구동 버튼 -->
            <button class="inline-flex items-center justify-center gap-[10px] bg-[#111111] text-white py-[18px] px-[48px] max-[550px]:py-[16px] max-[550px]:px-[32px] max-[550px]:w-full text-[1.05rem] font-extrabold rounded-[12px] shadow-[0_6px_20px_rgba(17,17,17,0.15)] transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)] hover:bg-[#222222] hover:-translate-y-[3px] hover:shadow-[0_12px_28px_rgba(17,17,17,0.25)] active:translate-y-0 active:shadow-[0_4px_12px_rgba(17,17,17,0.15)] select-none touch-manipulation cursor-pointer" id="btn-reminder-trigger">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                다짐 리마인드 하기
            </button>
        </div>
    </main>

    <!-- ==== 다짐 리마인드 전용 고품질 반응형 모달 컴포넌트 ==== -->
    <div class="modal-overlay fixed top-0 left-0 w-full h-full bg-[rgba(17,17,17,0.45)] backdrop-blur-[5px] flex items-center justify-center z-[2000] opacity-0 pointer-events-none transition-opacity duration-350 ease-[cubic-bezier(0.16,1,0.3,1)]" id="reminder-modal" role="dialog" aria-modal="true" aria-labelledby="modal-headline">
        <div class="modal-card bg-white rounded-[24px] p-[50px_35px] max-[550px]:p-[40px_24px] max-w-[460px] w-[90%] text-center shadow-[0_25px_60px_rgba(0,0,0,0.2)] border border-[#E5E8EB] scale-90 translate-y-[10px] transition-transform duration-400 ease-[cubic-bezier(0.16,1,0.3,1)]">
            <div class="w-[56px] h-[56px] bg-[#EBF5FB] text-[#0A6EBD] rounded-full inline-flex items-center justify-center mb-[24px]">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <!-- 실시간으로 텍스트가 바뀔 대상 브레이크 엘리먼트 -->
            <h2 id="modal-headline" class="text-[1.15rem] min-[550px]:text-[1.35rem] font-extrabold text-[#0A6EBD] leading-[1.5] mb-[35px] break-keep">다짐을 다시 한 번 마음에 새깁니다</h2>
            <button class="w-full bg-[#111111] text-white py-[15px] px-0 text-[1rem] font-bold rounded-[10px] hover:bg-[#222222] active:scale-[0.99] transition-[background-color,transform] duration-200 cursor-pointer" id="btn-modal-close">확인</button>
        </div>
    </div>

    <!-- ==== 복사 시작: 모바일 네비게이션 스크립트 ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('.navbar-toggle');
            const menu = document.querySelector('.navbar-menu');

            // 햄버거 버튼 클릭 이벤트 리스너
            toggleButton.addEventListener('click', () => {
                // 메뉴 보이기/숨기기 토글
                menu.classList.toggle('show');
                // 햄버거 아이콘 X 모양 변환 토글
                toggleButton.classList.toggle('open');
            });

            // 화면 너비가 넓어지면(PC버전) 모바일 메뉴 초기화
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    menu.classList.remove('show');
                    toggleButton.classList.remove('open');
                }
            });
        });
    </script>
    <!-- ==== 복사 끝: 모바일 네비게이션 스크립트 ==== -->

    <!-- ==== 다짐 리마인드 전용 바닐라 JavaScript 로직 ==== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM 핸들러 탐색
            const btnTrigger = document.getElementById('btn-reminder-trigger');
            const btnClose = document.getElementById('btn-modal-close');
            const modalOverlay = document.getElementById('reminder-modal');
            const modalHeadline = document.getElementById('modal-headline');

            // 다짐 랜덤 명언 모음집
            const coreQuotes = [
                "Hope is not strategy",
                "The best that never was, But I see possibility"
            ];

            // 1. 모달 레이어 오픈 처리기
            function openReminderModal() {
                // 무작위 다짐 인덱싱 연산
                const randomIndex = Math.floor(Math.random() * coreQuotes.length);
                const chosenQuote = coreQuotes[randomIndex];

                // 텍스트 주입 및 활성 상태 클래스 결합
                modalHeadline.textContent = chosenQuote;
                modalOverlay.classList.add('show');

                // 닫기 버튼으로 신속한 포커스 전이 (웹 접근성 준수)
                setTimeout(() => {
                    btnClose.focus();
                }, 50);
            }

            // 2. 모달 레이어 클로즈 처리기
            function closeReminderModal() {
                modalOverlay.classList.remove('show');
                
                // 모달을 닫은 뒤, 재조작의 편의성을 위해 호출했던 방아쇠 버튼으로 다시 포커스 유치
                btnTrigger.focus();
            }

            // 3. 트리거 클릭 시 모달 열기 바인딩
            btnTrigger.addEventListener('click', openReminderModal);

            // 4. 모달 닫기 버튼 클릭 시 닫기 바인딩
            btnClose.addEventListener('click', closeReminderModal);

            // 5. 모달 바깥의 어두운 영역(오버레이 바탕)을 터치/클릭하면 닫히게 처리
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    closeReminderModal();
                }
            });

            // 6. 키보드 Escape 단축키 조작 바인딩
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('show')) {
                    closeReminderModal();
                }
            });
        });
    </script>

</body>
</html>
